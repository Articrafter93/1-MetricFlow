name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check code scanning availability
        id: cs
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -eu
          status="$(curl -sS -o /tmp/code-scanning-check.json -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1")"
          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Skipping CodeQL: code scanning not enabled or unavailable (HTTP $status)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cs.outputs.enabled == 'true'
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        if: steps.cs.outputs.enabled == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        if: steps.cs.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        if: steps.cs.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3

      - name: CodeQL skipped
        if: steps.cs.outputs.enabled != 'true'
        run: echo "CodeQL skipped for this repository."
